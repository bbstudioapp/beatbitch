name: Release Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release signed APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rhythm_coach
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
      version: ${{ steps.version.outputs.value }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed -E 's/version:[[:space:]]*//; s/\+.*$//' | tr -d ' ')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version detected: $VERSION (tag v$VERSION)"

      - name: Skip if tag already exists
        id: gate
        working-directory: ${{ github.workspace }}
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — no new release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        if: steps.gate.outputs.skip != 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        if: steps.gate.outputs.skip != 'true'
        run: flutter pub get

      - name: Run tests
        if: steps.gate.outputs.skip != 'true'
        run: flutter test

      - name: Decode keystore
        if: steps.gate.outputs.skip != 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="${{ runner.temp }}/beatbitch-upload.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Write key.properties
        if: steps.gate.outputs.skip != 'true'
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          {
            printf 'storePassword=%s\n' "$STORE_PASSWORD"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=%s\n' "$KEYSTORE_PATH"
          } > android/key.properties

      - name: Fetch external assets from R2
        if: steps.gate.outputs.skip != 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
          AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
        run: |
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_ENDPOINT" ] || [ -z "$R2_BUCKET" ]; then
            echo "R2 secrets not configured — skipping external assets fetch."
            echo "Build will proceed with empty backgrounds/ambience folders (graceful fallback in app)."
            exit 0
          fi

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="auto"

          mkdir -p assets/backgrounds assets/audio/ambience

          echo "Fetching backgrounds from s3://$R2_BUCKET/backgrounds/v1/ ..."
          aws s3 sync "s3://$R2_BUCKET/backgrounds/v1/" assets/backgrounds/ \
            --endpoint-url "$R2_ENDPOINT" \
            --no-progress

          echo "Fetching ambience from s3://$R2_BUCKET/ambience/v1/ ..."
          aws s3 sync "s3://$R2_BUCKET/ambience/v1/" assets/audio/ambience/ \
            --endpoint-url "$R2_ENDPOINT" \
            --no-progress || echo "(ambience prefix empty or missing, continuing)"

          echo "--- Fetched assets ---"
          echo "Backgrounds:"
          ls -lh assets/backgrounds/ 2>/dev/null || echo "  (empty)"
          echo "Ambience:"
          ls -lh assets/audio/ambience/ 2>/dev/null || echo "  (empty)"

      - name: Build signed release APK
        if: steps.gate.outputs.skip != 'true'
        run: flutter build apk --release

      - name: Package APK and compute SHA256
        if: steps.gate.outputs.skip != 'true'
        id: pkg
        run: |
          SRC=build/app/outputs/flutter-apk/app-release.apk
          DST_NAME="BeatBitch-${{ steps.version.outputs.value }}.apk"
          DST_DIR=build/app/outputs/flutter-apk
          cp "$SRC" "$DST_DIR/$DST_NAME"
          ( cd "$DST_DIR" && sha256sum "$DST_NAME" > "$DST_NAME.sha256" )
          SHA=$(awk '{print $1}' "$DST_DIR/$DST_NAME.sha256")
          echo "apk_path=rhythm_coach/$DST_DIR/$DST_NAME" >> "$GITHUB_OUTPUT"
          echo "sha_path=rhythm_coach/$DST_DIR/$DST_NAME.sha256" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.gate.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BeatBitch ${{ steps.version.outputs.value }}
          body: |
            Release multi-plateformes : APK signé pour Android + zip portable Windows desktop.

            **APK Android SHA256** : `${{ steps.pkg.outputs.sha }}`

            ## 📲 Installation Android (side-load)

            Pas de Play Store — installation manuelle.

            1. Télécharge `BeatBitch-${{ steps.version.outputs.value }}.apk` et son `.sha256`.
            2. Vérifie l'intégrité : `sha256sum -c BeatBitch-${{ steps.version.outputs.value }}.apk.sha256`
            3. Active *Sources inconnues* pour ton gestionnaire de fichiers / navigateur.
            4. Ouvre l'APK et confirme l'installation.
            5. Au 1er lancement : adult gate 18+, puis onboarding 3 étapes.

            > Mises à jour automatiques via [Obtainium](https://github.com/ImranR98/Obtainium) — `Add App` → URL `https://github.com/bbstudioapp/beatbitch`.

            ## 🖥 Installation Windows desktop

            Le zip Windows arrive en parallèle de l'APK (job CI séparé). Si le fichier `BeatBitch-${{ steps.version.outputs.value }}-windows-x64.zip` apparaît dans la liste ci-dessous, il est prêt à utiliser :

            1. Télécharge `BeatBitch-${{ steps.version.outputs.value }}-windows-x64.zip` et son `.sha256`.
            2. Vérifie l'intégrité : `Get-FileHash BeatBitch-${{ steps.version.outputs.value }}-windows-x64.zip -Algorithm SHA256` (PowerShell).
            3. Dézippe où tu veux (`Documents\BeatBitch\`, clé USB, etc.) — c'est un binaire portable, pas d'install registry.
            4. Lance `rhythm_coach.exe`. Windows SmartScreen peut alerter (binaire non signé) → *Informations supplémentaires* → *Exécuter quand même*.
            5. Au 1er lancement : adult gate 18+, puis onboarding 3 étapes.

            > Désactivés sur Windows : vérif caméra des holds, notifications surprise. La voix coach utilise Microsoft Julie (SAPI). Tout le reste est identique à Android.

            ## ⚠ Assets binaires

            Si la CI a accès au bucket R2, les fonds animés et MP3 d'ambiance sont bundlés dans les builds. Sinon (fork, premier setup), le build dégrade gracieusement — fonds = dégradé animé, ambiance = silence.
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.apk_path }}
            ${{ steps.pkg.outputs.sha_path }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

  release-windows:
    name: Build and attach Windows portable zip
    runs-on: windows-latest
    needs: release
    if: needs.release.outputs.skip != 'true'
    defaults:
      run:
        working-directory: rhythm_coach

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Fetch external assets from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
          AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
        shell: bash
        run: |
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_ENDPOINT" ] || [ -z "$R2_BUCKET" ]; then
            echo "R2 secrets not configured — skipping external assets fetch."
            echo "Build will proceed with empty backgrounds/ambience folders (graceful fallback in app)."
            exit 0
          fi

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="auto"

          mkdir -p assets/backgrounds assets/audio/ambience

          echo "Fetching backgrounds from s3://$R2_BUCKET/backgrounds/v1/ ..."
          aws s3 sync "s3://$R2_BUCKET/backgrounds/v1/" assets/backgrounds/ \
            --endpoint-url "$R2_ENDPOINT" \
            --no-progress

          echo "Fetching ambience from s3://$R2_BUCKET/ambience/v1/ ..."
          aws s3 sync "s3://$R2_BUCKET/ambience/v1/" assets/audio/ambience/ \
            --endpoint-url "$R2_ENDPOINT" \
            --no-progress || echo "(ambience prefix empty or missing, continuing)"

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows zip and compute SHA256
        id: pkg
        shell: pwsh
        run: |
          $version = "${{ needs.release.outputs.version }}"
          $src = "build/windows/x64/runner/Release"
          $dstName = "BeatBitch-$version-windows-x64.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $dstName -Force
          $hash = (Get-FileHash $dstName -Algorithm SHA256).Hash.ToLower()
          "$hash  $dstName" | Out-File -Encoding ascii "$dstName.sha256"
          "zip_path=rhythm_coach/$dstName" | Out-File -Append -Encoding ascii $env:GITHUB_OUTPUT
          "sha_path=rhythm_coach/$dstName.sha256" | Out-File -Append -Encoding ascii $env:GITHUB_OUTPUT
          "sha=$hash" | Out-File -Append -Encoding ascii $env:GITHUB_OUTPUT

      - name: Attach to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            ${{ steps.pkg.outputs.zip_path }}
            ${{ steps.pkg.outputs.sha_path }}
          fail_on_unmatched_files: true
