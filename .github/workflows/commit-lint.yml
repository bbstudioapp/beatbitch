name: Lint commit messages

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  conventional-commits:
    name: Check Conventional Commits format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate every commit in the PR
        uses: webiny/action-conventional-commits@v1.3.0
        with:
          # Types autorisés (défaut Conventional Commits + quelques ajouts)
          # Référence : https://www.conventionalcommits.org/
          allowed-commit-types: "feat,fix,docs,style,refactor,perf,test,build,ci,chore,revert,i18n"
