name: beat_bitch
description: An offline rhythmic voice coach for Android.
publish_to: 'none'
version: 0.1.2+3

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_tts: ^4.2.0
  provider: ^6.1.2
  wakelock_plus: ^1.2.8
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.0
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.13.0
  sensors_plus: ^6.0.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/app_icon_monochrome.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sessions/
    - assets/audio/
    - assets/audio/ambience/
    - assets/audio/finale/
    - assets/audio/finale_chimes.json
    - assets/career/
    - assets/career/coaches/
    - assets/career/milestones/
    - assets/coach/
    - assets/punishments.json
    - assets/punishments_en.json
    - assets/random_comments.json
    - assets/random_comments_en.json
    - assets/ambience_packs.json
    - assets/ambience_packs_en.json
    - assets/nicknames.json
    - assets/nicknames_en.json
    - assets/icon/app_icon.png
    - assets/backgrounds/
