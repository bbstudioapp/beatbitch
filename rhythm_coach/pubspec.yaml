name: rhythm_coach
description: Coach vocal immersif pour des sessions d'entraînement rythmique.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_tts: ^4.2.0
  provider: ^6.1.2
  wakelock_plus: ^1.2.8
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.0
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.13.0
  sensors_plus: ^6.0.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sessions/
    - assets/audio/
    - assets/audio/ambience/
    - assets/audio/finale/
    - assets/audio/finale_chimes.json
    - assets/career/
    - assets/career/coaches/
    - assets/career/milestones/
    - assets/coach/
    - assets/punishments.json
    - assets/random_comments.json
    - assets/ambience_packs.json
    - assets/nicknames.json
